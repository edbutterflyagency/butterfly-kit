<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Butterfly Agency - KIT</title>
  <meta name="description" content="Butterfly Agency - Your GTM Partner in France. E-commerce media, events, community & consulting.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦋</text></svg>">
  <style>
    /* Reset */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-snap-type: y mandatory;
      overflow-y: scroll;
      overflow-x: hidden;
      height: 100%;
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      padding: 0;
      background: #000;
      height: 100%;
      -webkit-font-smoothing: antialiased;
    }

    /* Each section is a full-viewport slide */
    .slide {
      scroll-snap-align: start;
      scroll-snap-stop: always;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      position: relative;
      overflow: hidden;
    }

    /* The slide image maintains 16:9 aspect ratio and fills the viewport */
    .slide img {
      display: block;
      max-width: 100vw;
      max-height: 100vh;
      width: auto;
      height: auto;
      object-fit: contain;
      /* Prevent any blurriness */
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
    }

    /* For screens that match 16:9, make it fill completely */
    @media (min-aspect-ratio: 16/9) {
      .slide img {
        width: 100vw;
        height: auto;
      }
    }

    @media (max-aspect-ratio: 16/9) {
      .slide img {
        height: 100vh;
        width: auto;
      }
    }

    /* Navigation dots */
    .nav-dots {
      position: fixed;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.5);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .nav-dot:hover {
      background: rgba(255, 255, 255, 0.6);
      transform: scale(1.3);
    }

    .nav-dot.active {
      background: #E91E90;
      border-color: #E91E90;
      transform: scale(1.2);
    }

    /* Slide counter */
    .slide-counter {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      color: rgba(255, 255, 255, 0.5);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      letter-spacing: 2px;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    /* Progress bar */
    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, #E91E90, #FFD700, #4FC3F7);
      z-index: 100;
      transition: width 0.3s ease;
      width: 0%;
    }

    /* Hide scrollbar */
    html::-webkit-scrollbar {
      display: none;
    }
    html {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Keyboard hint on first slide */
    .scroll-hint {
      position: fixed;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      color: rgba(255, 255, 255, 0.4);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      animation: fadeInOut 3s ease infinite;
      pointer-events: none;
    }

    .scroll-hint .arrow {
      display: block;
      text-align: center;
      font-size: 18px;
      margin-top: 4px;
      animation: bounce 2s ease infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(6px); }
    }

    @keyframes fadeInOut {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }

    /* Mobile adjustments */
    @media (max-width: 768px) {
      .nav-dots {
        right: 10px;
        gap: 6px;
      }
      .nav-dot {
        width: 7px;
        height: 7px;
      }
    }

    /* Preloader */
    .preloader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease;
    }

    .preloader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .preloader-text {
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .preloader-bar {
      position: absolute;
      bottom: 40%;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 2px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .preloader-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #E91E90, #FFD700);
      width: 0%;
      transition: width 0.3s ease;
    }
  </style>
</head>
<body>

  <!-- Preloader -->
  <div class="preloader" id="preloader">
    <div class="preloader-text">Butterfly Agency</div>
    <div class="preloader-bar">
      <div class="preloader-bar-fill" id="preloaderFill"></div>
    </div>
  </div>

  <!-- Progress bar -->
  <div class="progress-bar" id="progressBar"></div>

  <!-- Navigation dots -->
  <nav class="nav-dots" id="navDots"></nav>

  <!-- Slide counter -->
  <div class="slide-counter" id="slideCounter">01 / 21</div>

  <!-- Scroll hint -->
  <div class="scroll-hint" id="scrollHint">
    Scroll
    <span class="arrow">&#8595;</span>
  </div>

  <!-- Slides -->
  <section class="slide" data-slide="1"><img src="images/slide-01.png" alt="Butterfly Agency - Your GTM Partner in France" loading="eager"></section>
  <section class="slide" data-slide="2"><img src="images/slide-02.png" alt="Exec Summary" loading="lazy"></section>
  <section class="slide" data-slide="3"><img src="images/slide-03.png" alt="Agenda" loading="lazy"></section>
  <section class="slide" data-slide="4"><img src="images/slide-04.png" alt="Who We Are" loading="lazy"></section>
  <section class="slide" data-slide="5"><img src="images/slide-05.png" alt="One Team" loading="lazy"></section>
  <section class="slide" data-slide="6"><img src="images/slide-06.png" alt="We Are Butterfly" loading="lazy"></section>
  <section class="slide" data-slide="7"><img src="images/slide-07.png" alt="What We Do" loading="lazy"></section>
  <section class="slide" data-slide="8"><img src="images/slide-08.png" alt="Media - Le Café de l'E-Commerce" loading="lazy"></section>
  <section class="slide" data-slide="9"><img src="images/slide-09.png" alt="Media - 30,000 Audience" loading="lazy"></section>
  <section class="slide" data-slide="10"><img src="images/slide-10.png" alt="Consulting GTM" loading="lazy"></section>
  <section class="slide" data-slide="11"><img src="images/slide-11.png" alt="Events" loading="lazy"></section>
  <section class="slide" data-slide="12"><img src="images/slide-12.png" alt="Our Events - Meeting Our Community" loading="lazy"></section>
  <section class="slide" data-slide="13"><img src="images/slide-13.png" alt="Store Tour Paris" loading="lazy"></section>
  <section class="slide" data-slide="14"><img src="images/slide-14.png" alt="WIRE - Women in Retail and Ecommerce" loading="lazy"></section>
  <section class="slide" data-slide="15"><img src="images/slide-15.png" alt="Brands2Buyers" loading="lazy"></section>
  <section class="slide" data-slide="16"><img src="images/slide-16.png" alt="1500 Experts in Our Communities" loading="lazy"></section>
  <section class="slide" data-slide="17"><img src="images/slide-17.png" alt="The Tech in Our Communities" loading="lazy"></section>
  <section class="slide" data-slide="18"><img src="images/slide-18.png" alt="Communities - Premium Clubs" loading="lazy"></section>
  <section class="slide" data-slide="19"><img src="images/slide-19.png" alt="The Brands in Our Communities" loading="lazy"></section>
  <section class="slide" data-slide="20"><img src="images/slide-20.png" alt="Our Offering" loading="lazy"></section>
  <section class="slide" data-slide="21"><img src="images/slide-21.png" alt="Butterfly Agency" loading="lazy"></section>

  <script>
    (function() {
      const totalSlides = 21;
      const navDots = document.getElementById('navDots');
      const slideCounter = document.getElementById('slideCounter');
      const progressBar = document.getElementById('progressBar');
      const scrollHint = document.getElementById('scrollHint');
      const preloader = document.getElementById('preloader');
      const preloaderFill = document.getElementById('preloaderFill');
      let currentSlide = 0;

      // Create nav dots
      for (let i = 0; i < totalSlides; i++) {
        const dot = document.createElement('div');
        dot.className = 'nav-dot' + (i === 0 ? ' active' : '');
        dot.addEventListener('click', () => {
          document.querySelectorAll('.slide')[i].scrollIntoView({ behavior: 'smooth' });
        });
        navDots.appendChild(dot);
      }

      // Preload images
      let loaded = 0;
      const images = document.querySelectorAll('.slide img');

      function checkAllLoaded() {
        loaded++;
        const pct = Math.round((loaded / totalSlides) * 100);
        preloaderFill.style.width = pct + '%';

        if (loaded >= totalSlides) {
          setTimeout(() => {
            preloader.classList.add('hidden');
          }, 300);
        }
      }

      images.forEach(img => {
        if (img.complete) {
          checkAllLoaded();
        } else {
          img.addEventListener('load', checkAllLoaded);
          img.addEventListener('error', checkAllLoaded);
        }
      });

      // Fallback: remove preloader after 5s
      setTimeout(() => {
        preloader.classList.add('hidden');
      }, 5000);

      // Intersection Observer for active slide detection
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const slideNum = parseInt(entry.target.dataset.slide);
            currentSlide = slideNum - 1;

            // Update dots
            document.querySelectorAll('.nav-dot').forEach((dot, i) => {
              dot.classList.toggle('active', i === currentSlide);
            });

            // Update counter
            slideCounter.textContent = String(slideNum).padStart(2, '0') + ' / ' + totalSlides;

            // Update progress
            progressBar.style.width = ((slideNum / totalSlides) * 100) + '%';

            // Hide scroll hint after first slide
            if (slideNum > 1) {
              scrollHint.style.opacity = '0';
            } else {
              scrollHint.style.opacity = '1';
            }
          }
        });
      }, {
        threshold: 0.5
      });

      document.querySelectorAll('.slide').forEach(slide => {
        observer.observe(slide);
      });

      // Keyboard navigation
      document.addEventListener('keydown', (e) => {
        const slides = document.querySelectorAll('.slide');
        if (e.key === 'ArrowDown' || e.key === 'PageDown' || e.key === ' ') {
          e.preventDefault();
          const next = Math.min(currentSlide + 1, totalSlides - 1);
          slides[next].scrollIntoView({ behavior: 'smooth' });
        } else if (e.key === 'ArrowUp' || e.key === 'PageUp') {
          e.preventDefault();
          const prev = Math.max(currentSlide - 1, 0);
          slides[prev].scrollIntoView({ behavior: 'smooth' });
        } else if (e.key === 'Home') {
          e.preventDefault();
          slides[0].scrollIntoView({ behavior: 'smooth' });
        } else if (e.key === 'End') {
          e.preventDefault();
          slides[totalSlides - 1].scrollIntoView({ behavior: 'smooth' });
        }
      });
    })();
  </script>
</body>
</html>
