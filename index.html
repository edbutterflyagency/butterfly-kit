<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Butterfly Agency - KIT</title>
  <meta name="description" content="Butterfly Agency - Your GTM Partner in France. E-commerce media, events, community & consulting.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦋</text></svg>">
  <!-- Preload first 5 slides for instant display -->
  <link rel="preload" as="image" href="images/slide-01.jpg">
  <link rel="preload" as="image" href="images/slide-02.jpg">
  <link rel="preload" as="image" href="images/slide-03.jpg">
  <link rel="preload" as="image" href="images/slide-04.jpg">
  <link rel="preload" as="image" href="images/slide-05.jpg">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      scroll-snap-type: y mandatory;
      overflow-y: scroll;
      overflow-x: hidden;
      height: 100%;
      scroll-behavior: smooth;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    html::-webkit-scrollbar { display: none; }

    body {
      margin: 0;
      padding: 0;
      background: #000;
      height: 100%;
      -webkit-font-smoothing: antialiased;
    }

    .slide {
      scroll-snap-align: start;
      scroll-snap-stop: always;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      position: relative;
      overflow: hidden;
    }

    .slide img {
      display: block;
      object-fit: contain;
      width: 100%;
      height: 100%;
    }

    /* Nav dots */
    .nav-dots {
      position: fixed;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .nav-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
      padding: 0;
    }
    .nav-dot:hover { background: rgba(255,255,255,0.6); transform: scale(1.4); }
    .nav-dot.active { background: #E91E90; transform: scale(1.3); }

    /* Counter */
    .slide-counter {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      color: rgba(255,255,255,0.4);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      letter-spacing: 2px;
      pointer-events: none;
    }

    /* Progress */
    .progress-bar {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      background: linear-gradient(90deg, #E91E90, #FFD700, #4FC3F7);
      z-index: 100;
      transition: width 0.3s ease;
      width: 0%;
    }

    /* Scroll hint */
    .scroll-hint {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      color: rgba(255,255,255,0.35);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-align: center;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
    .scroll-hint .arrow {
      display: block;
      margin-top: 3px;
      font-size: 16px;
      animation: bounce 2s ease infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(5px); }
    }

    @media (max-width: 768px) {
      .nav-dots { right: 8px; gap: 4px; }
      .nav-dot { width: 6px; height: 6px; }
    }
  </style>
</head>
<body>

  <div class="progress-bar" id="progressBar"></div>
  <nav class="nav-dots" id="navDots"></nav>
  <div class="slide-counter" id="slideCounter">01 / 21</div>
  <div class="scroll-hint" id="scrollHint">Scroll<span class="arrow">&#8595;</span></div>

  <section class="slide" data-slide="1"><img src="images/slide-01.jpg" alt="Butterfly Agency - Your GTM Partner in France"></section>
  <section class="slide" data-slide="2"><img src="images/slide-02.jpg" alt="Exec Summary"></section>
  <section class="slide" data-slide="3"><img src="images/slide-03.jpg" alt="Agenda"></section>
  <section class="slide" data-slide="4"><img src="images/slide-04.jpg" alt="Who We Are"></section>
  <section class="slide" data-slide="5"><img src="images/slide-05.jpg" alt="One Team"></section>
  <section class="slide" data-slide="6"><img src="images/slide-06.jpg" alt="We Are Butterfly"></section>
  <section class="slide" data-slide="7"><img src="images/slide-07.jpg" alt="What We Do"></section>
  <section class="slide" data-slide="8"><img src="images/slide-08.jpg" alt="Media - Le Caf&eacute; de l'E-Commerce"></section>
  <section class="slide" data-slide="9"><img src="images/slide-09.jpg" alt="Media - 30,000 Audience"></section>
  <section class="slide" data-slide="10"><img src="images/slide-10.jpg" alt="Consulting GTM"></section>
  <section class="slide" data-slide="11"><img src="images/slide-11.jpg" alt="Events"></section>
  <section class="slide" data-slide="12"><img src="images/slide-12.jpg" alt="Our Events"></section>
  <section class="slide" data-slide="13"><img src="images/slide-13.jpg" alt="Store Tour Paris"></section>
  <section class="slide" data-slide="14"><img src="images/slide-14.jpg" alt="WIRE Community"></section>
  <section class="slide" data-slide="15"><img src="images/slide-15.jpg" alt="Brands2Buyers"></section>
  <section class="slide" data-slide="16"><img src="images/slide-16.jpg" alt="1500 Experts"></section>
  <section class="slide" data-slide="17"><img src="images/slide-17.jpg" alt="Tech in Communities"></section>
  <section class="slide" data-slide="18"><img src="images/slide-18.jpg" alt="Communities"></section>
  <section class="slide" data-slide="19"><img src="images/slide-19.jpg" alt="Brands in Communities"></section>
  <section class="slide" data-slide="20"><img src="images/slide-20.jpg" alt="Our Offering"></section>
  <section class="slide" data-slide="21"><img src="images/slide-21.jpg" alt="Butterfly Agency"></section>

  <script>
    (function() {
      const TOTAL = 21;
      const navDots = document.getElementById('navDots');
      const counter = document.getElementById('slideCounter');
      const progress = document.getElementById('progressBar');
      const hint = document.getElementById('scrollHint');
      const slides = document.querySelectorAll('.slide');
      let current = 0;

      // Build dots
      for (let i = 0; i < TOTAL; i++) {
        const d = document.createElement('button');
        d.className = 'nav-dot' + (i === 0 ? ' active' : '');
        d.setAttribute('aria-label', 'Slide ' + (i + 1));
        d.onclick = () => slides[i].scrollIntoView({ behavior: 'smooth' });
        navDots.appendChild(d);
      }

      const dots = document.querySelectorAll('.nav-dot');

      // Intersection Observer
      const obs = new IntersectionObserver(entries => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            const n = parseInt(e.target.dataset.slide);
            current = n - 1;
            dots.forEach((d, i) => d.classList.toggle('active', i === current));
            counter.textContent = String(n).padStart(2, '0') + ' / ' + TOTAL;
            progress.style.width = ((n / TOTAL) * 100) + '%';
            hint.style.opacity = n > 1 ? '0' : '1';
          }
        });
      }, { threshold: 0.5 });

      slides.forEach(s => obs.observe(s));

      // Keyboard nav
      document.addEventListener('keydown', e => {
        if (['ArrowDown', 'PageDown', ' '].includes(e.key)) {
          e.preventDefault();
          slides[Math.min(current + 1, TOTAL - 1)].scrollIntoView({ behavior: 'smooth' });
        } else if (['ArrowUp', 'PageUp'].includes(e.key)) {
          e.preventDefault();
          slides[Math.max(current - 1, 0)].scrollIntoView({ behavior: 'smooth' });
        } else if (e.key === 'Home') {
          e.preventDefault(); slides[0].scrollIntoView({ behavior: 'smooth' });
        } else if (e.key === 'End') {
          e.preventDefault(); slides[TOTAL - 1].scrollIntoView({ behavior: 'smooth' });
        }
      });
    })();
  </script>
</body>
</html>
